name: CI
on:
  push:
    branches: [dev, "release/**", "feature/**"]
  pull_request:
    branches: [dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen --extra dev --extra anthropic --extra langchain 2>/dev/null || uv sync --extra dev --extra anthropic --extra langchain
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/  # Strict typing enforced; see [tool.mypy] in pyproject.toml

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev 2>/dev/null || uv sync
      - run: uv run bandit -r src/ -ll 2>&1 || true  # Security audit (informational, not blocking)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --extra anthropic --extra langchain --extra cache
      - run: uv run pytest tests/ -x -q --tb=short -m "not requires_api"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen 2>/dev/null || uv sync
      - run: uv run pip-audit  # Fail on known vulnerabilities